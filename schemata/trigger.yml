---
$schema: http://json-schema.org/schema#
$id: https://pglifecycle.readthedocs.io/en/stable/schemata/trigger.html
title: Trigger
description: Defines a trigger on a table
type: object
properties:
  name:
    title: Name
    description: The index name
    type: string
  sql:
    title: SQL Statement
    description: User-provided raw SQL snippet
    type: string
  when:
    title: When to fire the trigger
    enum: [BEFORE, AFTER, INSTEAD OF]
  events:
    title: The events that cause the fire to trigger
    type: array
    items:
      enum: [INSERT, UPDATE, DELETE, TRUNCATE]
  for_each:
    title: For Each Row or Statement
    enum: [ROW, STATEMENT]
    default: STATEMENT
  constraint:
    title: Constraint Trigger
    description: >
      Create the trigger as a CONSTRAINT TRIGGER (always AFTER and FOR
      EACH ROW); it may be deferred to the end of the transaction.
    type: boolean
  deferrable:
    title: Deferrable
    description: Whether a constraint trigger's firing can be deferred.
    type: boolean
  initially_deferred:
    title: Initially Deferred
    description: Whether a deferrable constraint trigger defers by default.
    type: boolean
  condition:
    title: Trigger Condition
    description: >
      A Boolean expression that determines whether the trigger function will
      actually be executed. If WHEN is specified, the function will only be
      called if the condition returns true.
    type: string
  function:
    title: Trigger Function
    description: The trigger function to execute
    type: string
  arguments:
    title: Funciton Arguments
    description: >
      An optional comma-separated list of arguments to be provided to the
      function when the trigger is executed.
    type: array
    items:
      anyOf:
        - type: boolean
        - type: integer
        - type: number
        - type: string
  comment:
    title: Comment
    description: An optional comment about the table
    type: string
  dependencies:
    title: Dependencies
    description: Database objects this object is dependent upon
    $package_schema: dependencies
additionalProperties: false
oneOf:
  - required: [sql]
    not:
      anyOf:
        - required: [name]
        - required: [when]
        - required: [events]
        - required: [for_each]
        - required: [constraint]
        - required: [deferrable]
        - required: [initially_deferred]
        - required: [condition]
        - required: [function]
        - required: [arguments]
  - required: [name, when, events, function]
    not: {required: [sql]}
allOf:
  - if:
      properties: {deferrable: {const: true}}
      required: [deferrable]
    then:
      properties: {constraint: {const: true}}
      required: [constraint]
  - if:
      properties: {initially_deferred: {const: true}}
      required: [initially_deferred]
    then:
      properties:
        constraint: {const: true}
        deferrable: {const: true}
      required: [constraint, deferrable]
  - if:
      properties: {constraint: {const: true}}
      required: [constraint]
    then:
      properties:
        when: {const: AFTER}
        for_each: {const: ROW}
