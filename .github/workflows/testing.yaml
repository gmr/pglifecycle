name: Testing
on:
  pull_request:
  push:
    branches: ["*"]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '*.rst'
    tags-ignore: ["*"]

env:
  TEST_HOST: postgres

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
        postgres: [15, 16, 17, 18]
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --name postgres
          --hostname postgres

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '${{ matrix.python }}'

      - name: Install PostgreSQL client tools
        run: |
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get update
          sudo apt-get install -y postgresql-client-${{ matrix.postgres }}

      - name: Prepare container directories and copy fixtures
        run: |
          docker exec postgres mkdir -p /data /fixtures
          docker exec postgres chmod 777 /data
          mkdir -p build/data
          docker cp fixtures/. postgres:/fixtures/

      - name: Bootstrap environment
        run: ./bootstrap
        env:
          CI: true

      - name: Copy dumps from container to workspace
        run: |
          docker cp postgres:/data/. build/data/

      - name: Lint Check
        run: uv run pre-commit run --all-files

      - name: Run tests
        run: |
          uv run coverage run
          uv run coverage report
          uv run coverage xml

      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./build/coverage.xml
          flags: unittests
